services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: myjournal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-myjournal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-myjournal123}
      POSTGRES_DB: ${DB_NAME:-myjournal}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myjournal} -d ${DB_NAME:-myjournal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: myjournal-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: