# Railway Deployment Configuration
# https://docs.railway.app/deploy/config-as-code

[build]
# Use the Dockerfile in the next-app directory
dockerfilePath = "./Dockerfile"

# Build-time environment variables (required for NEXT_PUBLIC_* vars)
[build.env]
NEXT_PUBLIC_API_URL = "${NEXT_PUBLIC_API_URL}"
ASSISTANT_NAME = "${ASSISTANT_NAME}"
GITHUB_CONTRIBUTIONS_API_URL = "${GITHUB_CONTRIBUTIONS_API_URL}"

[deploy]
# Health check configuration - checking root path as Next.js has no /api/health endpoint
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Runtime environment variables
[deploy.env]
NODE_ENV = "production"
PORT = "3000"
