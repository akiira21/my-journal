version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/modules/post/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "postdb"
        out: "internal/modules/post/postdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
  - engine: "postgresql"
    queries: "internal/modules/chat/queries/"
    schema: "migrations/"
    gen:
      go:
        package: "chatdb"
        out: "internal/modules/chat/chatdb"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true